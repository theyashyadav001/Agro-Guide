workflows:
  android-workflow:
    name: AgroGuide - Android Debug APK
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.agroguide.app"
        CAPACITOR_VERSION: "6"
    scripts:
      - name: Install Node dependencies
        script: |
          cd agroguide-app
          npm install
      - name: Add Android platform
        script: |
          cd agroguide-app
          npx cap add android || echo "Android platform already exists"
          npx cap sync android
      - name: Build Android APK
        script: |
          cd agroguide-app/android
          ./gradlew assembleDebug
    artifacts:
      - agroguide-app/android/app/build/outputs/**/*.apk

  ios-workflow:
    name: AgroGuide - iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.agroguide.app
      vars:
        XCODE_WORKSPACE: "agroguide-app/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install Node dependencies
        script: |
          cd agroguide-app
          npm install
      - name: Add iOS platform
        script: |
          cd agroguide-app
          npx cap add ios || echo "iOS platform already exists"
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd agroguide-app/ios/App
          pod install
      - name: Build iOS IPA
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/AgroGuide.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/AgroGuide.xcarchive \
            -exportPath build/AgroGuide.ipa \
            -exportOptionsPlist ExportOptions.plist
    artifacts:
      - build/AgroGuide.ipa/**
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.ipa
