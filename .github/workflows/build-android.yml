name: Build AgroGuide Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: agroguide-app/package-lock.json

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node dependencies
        working-directory: agroguide-app
        run: npm install --legacy-peer-deps

      - name: Sync Capacitor (copy frontend web assets into Android)
        working-directory: agroguide-app
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: agroguide-app/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: agroguide-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agroguide-debug-apk
          path: agroguide-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "✅ APK built successfully!"
          ls -lh agroguide-app/android/app/build/outputs/apk/debug/app-debug.apk
