name: Build AgroGuide Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: agroguide-app/package-lock.json

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        working-directory: agroguide-app
        run: npm install --legacy-peer-deps

      - name: Verify frontend assets exist
        run: |
          echo "Frontend files:"
          ls -la frontend/
          echo "JS files:"
          ls -la frontend/js/

      - name: Sync Capacitor (copy frontend web assets into Android)
        working-directory: agroguide-app
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: agroguide-app/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: agroguide-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: ls -lh agroguide-app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agroguide-debug-apk
          path: agroguide-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AgroGuide Build #${{ github.run_number }}"
          body: "✅ Debug APK — auto-built from latest commit.\n\nDownload **app-debug.apk** below and install on your Android device."
          files: agroguide-app/android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
